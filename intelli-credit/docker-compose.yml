services:
  ai-service:
    build: ./ai-service
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - /tmp/intelli-credit:/tmp/intelli-credit
      - ${DEEPSEEK_MODEL_PATH}:/models/deepseek-vl2-tiny:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  neo4j:
    image: neo4j:5.18-community
    ports:
      - "7474:7474"     # Neo4j Browser UI — http://localhost:7474 (useful for debugging)
      - "7687:7687"     # Bolt protocol — what the Python driver connects to
    environment:
      NEO4J_AUTH: neo4j/intelli_credit_neo4j
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_max__size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"     # REST API — http://localhost:6333/dashboard (Qdrant UI)
      - "6334:6334"     # gRPC port (not used directly, exposed for future use)
    volumes:
      - qdrant_data:/qdrant/storage    # persists vectors across container restarts
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data: